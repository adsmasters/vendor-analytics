        /* ── A. KPI Section ── */
        // KPI period state
        var kpiRangeFrom = null;
        var kpiRangeTo = null;
        var kpiCompareEnabled = false;
        var kpiCompareFrom = null;
        var kpiCompareTo = null;

        function renderKPIs() {
            var el = document.getElementById('kpiSection');
            if (!el) return;
            if (availableMonths.length === 0) { el.innerHTML = ''; return; }

            // Defaults
            if (!kpiRangeFrom || availableMonths.indexOf(kpiRangeFrom) === -1) kpiRangeFrom = availableMonths[0];
            if (!kpiRangeTo || availableMonths.indexOf(kpiRangeTo) === -1) kpiRangeTo = availableMonths[availableMonths.length - 1];

            // Build month options
            var monthOpts = availableMonths.map(function(m) {
                var ps = allData.find(function(r) { return monthSortKey(r.period_start) === m; });
                var lbl = ps ? monthLabel(ps.period_start) : m;
                return { value: m, label: lbl };
            });

            function makeSelect(id, selected, onchange) {
                return '<select class="filter-select" id="' + id + '" onchange="' + onchange + '">' +
                    monthOpts.map(function(o) {
                        return '<option value="' + o.value + '"' + (o.value === selected ? ' selected' : '') + '>' + o.label + '</option>';
                    }).join('') + '</select>';
            }

            // Aggregate data for range
            function sumRange(fromMonth, toMonth) {
                var result = { ordered_revenue: 0, ordered_units: 0, shipped_revenue: 0, shipped_units: 0, customer_returns: 0 };
                availableMonths.forEach(function(m) {
                    if (m >= fromMonth && m <= toMonth) {
                        var data = getDataForMonth(m);
                        data.forEach(function(r) {
                            result.ordered_revenue += r.ordered_revenue || 0;
                            result.ordered_units += r.ordered_units || 0;
                            result.shipped_revenue += r.shipped_revenue || 0;
                            result.shipped_units += r.shipped_units || 0;
                            result.customer_returns += r.customer_returns || 0;
                        });
                    }
                });
                return result;
            }

            var curr = sumRange(kpiRangeFrom, kpiRangeTo);
            var comp = null;
            if (kpiCompareEnabled && kpiCompareFrom && kpiCompareTo) {
                comp = sumRange(kpiCompareFrom, kpiCompareTo);
            }

            // Range labels
            var fromLabel = monthOpts.find(function(o) { return o.value === kpiRangeFrom; });
            var toLabel = monthOpts.find(function(o) { return o.value === kpiRangeTo; });
            var rangeStr = kpiRangeFrom === kpiRangeTo ? (fromLabel ? fromLabel.label : '') : (fromLabel ? fromLabel.label : '') + ' – ' + (toLabel ? toLabel.label : '');
            var compRangeStr = '';
            if (kpiCompareEnabled && kpiCompareFrom && kpiCompareTo) {
                var compFromLabel = monthOpts.find(function(o) { return o.value === kpiCompareFrom; });
                var compToLabel = monthOpts.find(function(o) { return o.value === kpiCompareTo; });
                compRangeStr = kpiCompareFrom === kpiCompareTo ? (compFromLabel ? compFromLabel.label : '') : (compFromLabel ? compFromLabel.label : '') + ' – ' + (compToLabel ? compToLabel.label : '');
            }

            // Controls
            var html = '<div class="section-card"><div class="section-body">' +
                '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;">' +
                    '<span style="font-size:13px;font-weight:600;">Zeitraum:</span>' +
                    makeSelect('kpiFrom', kpiRangeFrom, 'kpiChangeFrom(this.value)') +
                    '<span style="font-size:12px;color:var(--text-secondary);">bis</span>' +
                    makeSelect('kpiTo', kpiRangeTo, 'kpiChangeTo(this.value)') +
                    '<label style="display:flex;align-items:center;gap:4px;margin-left:16px;cursor:pointer;font-size:13px;">' +
                        '<input type="checkbox" id="kpiCompareCheck" onchange="kpiToggleCompare(this.checked)"' + (kpiCompareEnabled ? ' checked' : '') + '>' +
                        ' Vergleichen mit:' +
                    '</label>';

            if (kpiCompareEnabled) {
                if (!kpiCompareFrom || availableMonths.indexOf(kpiCompareFrom) === -1) kpiCompareFrom = availableMonths[0];
                if (!kpiCompareTo || availableMonths.indexOf(kpiCompareTo) === -1) kpiCompareTo = availableMonths[Math.min(availableMonths.length - 1, availableMonths.indexOf(kpiRangeFrom) - 1 >= 0 ? availableMonths.indexOf(kpiRangeFrom) - 1 : 0)];
                html += makeSelect('kpiCompFrom', kpiCompareFrom, 'kpiChangeCompFrom(this.value)') +
                    '<span style="font-size:12px;color:var(--text-secondary);">bis</span>' +
                    makeSelect('kpiCompTo', kpiCompareTo, 'kpiChangeCompTo(this.value)');
            }

            html += '</div>';

            // KPI Cards
            var kpis = [
                { key: 'ordered_revenue', label: 'Bestellungsumsatz', fmt: 'eur', tip: 'Gesamtumsatz aus Bestellungen im gewählten Zeitraum.' },
                { key: 'ordered_units', label: 'Bestellte Einheiten', fmt: 'int', tip: 'Anzahl bestellter Einheiten im gewählten Zeitraum.' },
                { key: 'shipped_revenue', label: 'Versandumsatz', fmt: 'eur', tip: 'Umsatz aus versandten Bestellungen.' },
                { key: 'shipped_units', label: 'Versandte Einheiten', fmt: 'int', tip: 'Anzahl versandter Einheiten.' },
                { key: 'customer_returns', label: 'Kundenrücksendungen', fmt: 'int', tip: 'Anzahl der Kundenrücksendungen. Weniger ist besser.' }
            ];

            html += '<div class="kpi-grid">';
            kpis.forEach(function(kpi, i) {
                var currVal = curr[kpi.key] || 0;
                var formatted = kpi.fmt === 'eur' ? formatEuro(currVal) : formatInt(currVal);
                var diffStr = '—';
                var diffClass = 'neutral';

                if (comp) {
                    var compVal = comp[kpi.key] || 0;
                    var diff = compVal ? ((currVal - compVal) / compVal) * 100 : 0;
                    diffClass = diff > 0 ? 'positive' : diff < 0 ? 'negative' : 'neutral';
                    if (kpi.key === 'customer_returns') {
                        diffClass = diff > 0 ? 'negative' : diff < 0 ? 'positive' : 'neutral';
                    }
                    var compFormatted = kpi.fmt === 'eur' ? formatEuro(compVal) : formatInt(compVal);
                    diffStr = (compVal ? (diff > 0 ? '&#9650; +' : diff < 0 ? '&#9660; ' : '') + fmtPct.format(Math.abs(diff)) + ' %' : '—') +
                        '<div style="font-size:11px;color:var(--text-secondary);margin-top:6px;">' + compRangeStr + '</div>' +
                        '<div style="font-size:14px;font-weight:600;margin-top:2px;">' + compFormatted + '</div>';
                }

                html += '<div class="kpi-card">' +
                    '<div class="kpi-label">' + kpi.label + ' ' + infoIcon('kpi' + i, kpi.label, kpi.tip) + '</div>' +
                    '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:2px;">' + rangeStr + '</div>' +
                    '<div class="kpi-value">' + formatted + '</div>' +
                    '<div class="kpi-diff ' + diffClass + '">' + diffStr + '</div>' +
                    '</div>';
            });
            html += '</div></div></div>';
            el.innerHTML = html;
        }

        window.kpiChangeFrom = function(val) { kpiRangeFrom = val; renderKPIs(); initInfoIcons(); };
        window.kpiChangeTo = function(val) { kpiRangeTo = val; renderKPIs(); initInfoIcons(); };
        window.kpiToggleCompare = function(checked) { kpiCompareEnabled = checked; renderKPIs(); initInfoIcons(); };
        window.kpiChangeCompFrom = function(val) { kpiCompareFrom = val; renderKPIs(); initInfoIcons(); };
        window.kpiChangeCompTo = function(val) { kpiCompareTo = val; renderKPIs(); initInfoIcons(); };

        /* ── B. Trend Chart ── */
        function renderTrendSection() {
            var el = document.getElementById('trendSection');
            if (!el) return;
            if (selectedMonths.length === 0) { el.innerHTML = ''; return; }

            el.innerHTML =
                '<div class="section-card">' +
                    '<div class="section-header">' +
                        '<h3>Trend-Analyse ' + infoIcon('trend', 'Trend-Analyse', 'Bestellungsumsatz als Balken und bestellte Einheiten als Linie pro Monat.') + '</h3>' +
                    '</div>' +
                    '<div class="section-body">' +
                        '<div class="chart-container" style="max-height:350px;"><canvas id="trendChart"></canvas></div>' +
                    '</div>' +
                '</div>';

            renderTrendChart();
        }

        function renderTrendChart() {
            var canvas = document.getElementById('trendChart');
            if (!canvas) return;
            if (trendChartInstance) { trendChartInstance.destroy(); trendChartInstance = null; }

            var labels = [];
            var revenueData = [];
            var unitsData = [];

            selectedMonths.forEach(function(m) {
                var data = getDataForMonth(m);
                var ps = data.length > 0 ? data[0].period_start : m;
                labels.push(monthLabel(ps));
                revenueData.push(data.reduce(function(s, r) { return s + (r.ordered_revenue || 0); }, 0));
                unitsData.push(data.reduce(function(s, r) { return s + (r.ordered_units || 0); }, 0));
            });

            var textColor = getThemeColor('--text-secondary');
            var gridColor = getThemeColor('--chart-grid');

            trendChartInstance = new Chart(canvas, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Bestellungsumsatz',
                            data: revenueData,
                            backgroundColor: 'rgba(53, 81, 255, 0.7)',
                            borderColor: '#3551FF',
                            borderWidth: 1,
                            borderRadius: 4,
                            yAxisID: 'y',
                            order: 2
                        },
                        {
                            label: 'Bestellte Einheiten',
                            data: unitsData,
                            type: 'line',
                            borderColor: '#e85d04',
                            backgroundColor: 'rgba(232, 93, 4, 0.1)',
                            borderWidth: 2,
                            pointRadius: 4,
                            pointBackgroundColor: '#e85d04',
                            tension: 0.3,
                            fill: false,
                            yAxisID: 'y1',
                            order: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { labels: { color: textColor, font: { family: 'Arial', size: 12 } } },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    if (ctx.dataset.yAxisID === 'y') return ctx.dataset.label + ': ' + formatEuro(ctx.raw);
                                    return ctx.dataset.label + ': ' + formatInt(ctx.raw);
                                }
                            }
                        }
                    },
                    scales: {
                        x: { ticks: { color: textColor, font: { family: 'Arial', size: 11 } }, grid: { color: gridColor } },
                        y: {
                            type: 'linear', position: 'left',
                            ticks: { color: textColor, font: { family: 'Arial', size: 11 }, callback: function(v) { return formatEuro(v); } },
                            grid: { color: gridColor },
                            title: { display: true, text: 'Umsatz (EUR)', color: textColor, font: { family: 'Arial', size: 12 } }
                        },
                        y1: {
                            type: 'linear', position: 'right',
                            ticks: { color: textColor, font: { family: 'Arial', size: 11 }, callback: function(v) { return formatInt(v); } },
                            grid: { drawOnChartArea: false },
                            title: { display: true, text: 'Einheiten', color: textColor, font: { family: 'Arial', size: 12 } }
                        }
                    }
                }
            });
        }

        /* ── C. Top Movers + Vergleichstabelle ── */
        function renderTopMovers() {
            var el = document.getElementById('topMoverSection');
            if (!el) return;

            if (availableMonths.length < 2) {
                el.innerHTML = '<div class="section-card"><div class="section-body" style="padding:40px 20px;text-align:center;color:var(--text-secondary);">Mindestens zwei Monate benötigt für Top Movers.</div></div>';
                return;
            }

            // Default: A = latest, B = previous
            if (!moverMonthA || availableMonths.indexOf(moverMonthA) === -1) moverMonthA = availableMonths[availableMonths.length - 1];
            if (!moverMonthB || availableMonths.indexOf(moverMonthB) === -1) moverMonthB = availableMonths[availableMonths.length - 2];

            var lastData = getDataForMonth(moverMonthA);
            var prevData = getDataForMonth(moverMonthB);

            var lastMap = {};
            lastData.forEach(function(r) { if (r.asin) lastMap[r.asin] = r; });
            var prevMap = {};
            prevData.forEach(function(r) { if (r.asin) prevMap[r.asin] = r; });

            var metricKey = moverMetric;
            var metricFmt = getMetricFormatter(metricKey);
            var metricLbl = getMetricLabel(metricKey);
            var minThreshold = metricKey === 'ordered_revenue' ? 100 : 1;

            var movers = [];
            Object.keys(lastMap).forEach(function(asin) {
                if (!prevMap[asin]) return;
                var currVal = lastMap[asin][metricKey] || 0;
                var prevVal = prevMap[asin][metricKey] || 0;
                if (currVal < minThreshold && prevVal < minThreshold) return;
                var deltaAbs = currVal - prevVal;
                var deltaPct = prevVal ? ((currVal - prevVal) / prevVal) * 100 : 0;
                movers.push({
                    asin: asin,
                    title: lastMap[asin].title || '',
                    currVal: currVal,
                    prevVal: prevVal,
                    deltaAbs: deltaAbs,
                    deltaPct: deltaPct
                });
            });

            var winners = movers.filter(function(m) { return m.deltaAbs > 0; }).sort(function(a, b) { return b.deltaAbs - a.deltaAbs; }).slice(0, moverTopN);
            var losers = movers.filter(function(m) { return m.deltaAbs < 0; }).sort(function(a, b) { return a.deltaAbs - b.deltaAbs; }).slice(0, moverTopN);

            var lastLabel = monthLabel(lastData.length > 0 ? lastData[0].period_start : moverMonthA);
            var prevLabel = monthLabel(prevData.length > 0 ? prevData[0].period_start : moverMonthB);

            // Month selector options
            var monthOptA = availableMonths.map(function(m) {
                var ps = allData.find(function(r) { return monthSortKey(r.period_start) === m; });
                var lbl = ps ? monthLabel(ps.period_start) : m;
                return '<option value="' + m + '"' + (m === moverMonthA ? ' selected' : '') + '>' + lbl + '</option>';
            }).join('');
            var monthOptB = availableMonths.map(function(m) {
                var ps = allData.find(function(r) { return monthSortKey(r.period_start) === m; });
                var lbl = ps ? monthLabel(ps.period_start) : m;
                return '<option value="' + m + '"' + (m === moverMonthB ? ' selected' : '') + '>' + lbl + '</option>';
            }).join('');

            var html = '<div class="section-card">' +
                '<div class="section-header">' +
                    '<h3>Top Movers & Vergleich ' + infoIcon('movers', 'Top Movers', 'Vergleicht zwei Monate. Top Movers zeigt die größten Gewinner und Verlierer, darunter die vollständige Vergleichstabelle.') + '</h3>' +
                    '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' +
                        '<select class="filter-select" onchange="changeMoverMonthA(this.value)">' + monthOptA + '</select>' +
                        '<span style="font-size:12px;color:var(--text-secondary);">vs.</span>' +
                        '<select class="filter-select" onchange="changeMoverMonthB(this.value)">' + monthOptB + '</select>' +
                        '<select class="filter-select" onchange="changeMoverTopN(this.value)">' +
                            '<option value="10"' + (moverTopN === 10 ? ' selected' : '') + '>Top 10</option>' +
                            '<option value="20"' + (moverTopN === 20 ? ' selected' : '') + '>Top 20</option>' +
                            '<option value="50"' + (moverTopN === 50 ? ' selected' : '') + '>Top 50</option>' +
                        '</select>' +
                        '<select class="filter-select" onchange="changeMoverMetric(this.value)">' +
                            '<option value="ordered_revenue"' + (moverMetric === 'ordered_revenue' ? ' selected' : '') + '>Nach Umsatz</option>' +
                            '<option value="ordered_units"' + (moverMetric === 'ordered_units' ? ' selected' : '') + '>Nach Einheiten</option>' +
                            '<option value="customer_returns"' + (moverMetric === 'customer_returns' ? ' selected' : '') + '>Nach Rücksendungen</option>' +
                        '</select>' +
                        '<button class="btn-export" onclick="exportTopMovers()">&#8681; Export</button>' +
                    '</div>' +
                '</div>' +
                '<div class="section-body">';

            // Lists
            html += '<div class="top-mover-grid">';

            // Winners
            html += '<div class="top-mover-card"><div class="top-mover-title winners">Top ' + moverTopN + ' Gewinner (' + metricLbl + ')</div>';
            if (winners.length === 0) {
                html += '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:13px;">Keine Gewinner</div>';
            } else {
                winners.forEach(function(m) {
                    html += '<div class="top-mover-row">' +
                        '<div style="display:flex;align-items:center;overflow:hidden;flex:1;">' +
                            '<a href="product.html?client=' + selectedClientId + '&asin=' + m.asin + '" class="asin-link">' + m.asin + '</a>' +
                            '<span class="top-mover-title-text">' + m.title + '</span>' +
                        '</div>' +
                        '<div class="top-mover-vals">' +
                            '<span class="top-mover-abs">+' + metricFmt(m.deltaAbs) + '</span>' +
                            '<span class="top-mover-pct positive">+' + fmtPct.format(m.deltaPct) + ' %</span>' +
                        '</div></div>';
                });
            }
            html += '</div>';

            // Losers
            html += '<div class="top-mover-card"><div class="top-mover-title losers">Top ' + moverTopN + ' Verlierer (' + metricLbl + ')</div>';
            if (losers.length === 0) {
                html += '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:13px;">Keine Verlierer</div>';
            } else {
                losers.forEach(function(m) {
                    html += '<div class="top-mover-row">' +
                        '<div style="display:flex;align-items:center;overflow:hidden;flex:1;">' +
                            '<a href="product.html?client=' + selectedClientId + '&asin=' + m.asin + '" class="asin-link">' + m.asin + '</a>' +
                            '<span class="top-mover-title-text">' + m.title + '</span>' +
                        '</div>' +
                        '<div class="top-mover-vals">' +
                            '<span class="top-mover-abs">' + metricFmt(m.deltaAbs) + '</span>' +
                            '<span class="top-mover-pct negative">' + fmtPct.format(m.deltaPct) + ' %</span>' +
                        '</div></div>';
                });
            }
            html += '</div></div>';

            // Charts
            html += '<div class="top-mover-charts">' +
                '<div class="top-mover-chart-card">' +
                    '<div class="top-mover-chart-title"><span class="dot green"></span> Gewinner (' + metricLbl + ')</div>' +
                    '<div class="chart-container" style="height:' + Math.max(250, winners.length * 28) + 'px;"><canvas id="winnersChart"></canvas></div>' +
                '</div>' +
                '<div class="top-mover-chart-card">' +
                    '<div class="top-mover-chart-title"><span class="dot red"></span> Verlierer (' + metricLbl + ')</div>' +
                    '<div class="chart-container" style="height:' + Math.max(250, losers.length * 28) + 'px;"><canvas id="losersChart"></canvas></div>' +
                '</div>' +
            '</div>';

            html += '</div>';

            // Full comparison table
            var allMovers = movers.slice().sort(function(a, b) {
                var va = a[moverSortCol], vb = b[moverSortCol];
                if (typeof va === 'string') return moverSortDir * va.localeCompare(vb);
                return moverSortDir * (va - vb);
            });

            function moverThClass(col) { return moverSortCol === col ? ' class="sorted"' : ''; }
            function moverSortIcon(col) { return moverSortCol === col ? (moverSortDir === 1 ? ' &#9650;' : ' &#9660;') : ' &#9650;'; }

            html += '<div style="margin-top:24px;">' +
                '<h4 style="font-size:14px;margin-bottom:12px;">Alle Produkte im Vergleich (' + allMovers.length + ')</h4>' +
                '<div class="table-wrap"><table><thead><tr>' +
                    '<th' + moverThClass('asin') + ' onclick="moverSort(\'asin\')" style="text-align:left;">ASIN ' + moverSortIcon('asin') + '</th>' +
                    '<th' + moverThClass('title') + ' onclick="moverSort(\'title\')" style="text-align:left;">Titel ' + moverSortIcon('title') + '</th>' +
                    '<th' + moverThClass('currVal') + ' onclick="moverSort(\'currVal\')">' + lastLabel + ' ' + moverSortIcon('currVal') + '</th>' +
                    '<th' + moverThClass('prevVal') + ' onclick="moverSort(\'prevVal\')">' + prevLabel + ' ' + moverSortIcon('prevVal') + '</th>' +
                    '<th' + moverThClass('deltaAbs') + ' onclick="moverSort(\'deltaAbs\')">&Delta; ' + moverSortIcon('deltaAbs') + '</th>' +
                    '<th' + moverThClass('deltaPct') + ' onclick="moverSort(\'deltaPct\')">&Delta; % ' + moverSortIcon('deltaPct') + '</th>' +
                '</tr></thead><tbody>';

            allMovers.forEach(function(m) {
                var cls = m.deltaAbs > 0 ? 'val-positive' : m.deltaAbs < 0 ? 'val-negative' : '';
                html += '<tr>' +
                    '<td style="text-align:left;font-size:12px;"><a href="product.html?client=' + selectedClientId + '&asin=' + m.asin + '" class="asin-link">' + m.asin + '</a></td>' +
                    '<td style="text-align:left;max-width:200px;overflow:hidden;text-overflow:ellipsis;" title="' + m.title.replace(/"/g, '&quot;') + '">' + m.title + '</td>' +
                    '<td>' + metricFmt(m.currVal) + '</td>' +
                    '<td>' + metricFmt(m.prevVal) + '</td>' +
                    '<td class="' + cls + '">' + (m.deltaAbs > 0 ? '+' : '') + metricFmt(m.deltaAbs) + '</td>' +
                    '<td class="' + cls + '">' + (m.deltaPct > 0 ? '+' : '') + fmtPct.format(m.deltaPct) + ' %</td>' +
                '</tr>';
            });

            html += '</tbody></table></div></div>';
            html += '</div></div>';
            el.innerHTML = html;

            renderTopMoverCharts(winners, losers);
        }

        window.changeMoverMonthA = function(val) {
            moverMonthA = val;
            destroyAllCharts();
            renderTopMovers();
            initInfoIcons();
        };

        window.changeMoverMonthB = function(val) {
            moverMonthB = val;
            destroyAllCharts();
            renderTopMovers();
            initInfoIcons();
        };

        window.moverSort = function(col) {
            if (moverSortCol === col) { moverSortDir *= -1; }
            else { moverSortCol = col; moverSortDir = col === 'asin' || col === 'title' ? 1 : -1; }
            destroyAllCharts();
            renderTopMovers();
            initInfoIcons();
        };

        function changeMoverTopN(val) {
            moverTopN = parseInt(val);
            destroyAllCharts();
            renderTopMovers();
            initInfoIcons();
        }

        function changeMoverMetric(val) {
            moverMetric = val;
            destroyAllCharts();
            renderTopMovers();
            initInfoIcons();
        }

        function exportTopMovers() {
            if (!moverMonthA || !moverMonthB) return;
            var lastData = getDataForMonth(moverMonthA);
            var prevData = getDataForMonth(moverMonthB);
            var lastMap = {}; lastData.forEach(function(r) { if (r.asin) lastMap[r.asin] = r; });
            var prevMap = {}; prevData.forEach(function(r) { if (r.asin) prevMap[r.asin] = r; });
            var metricKey = moverMetric;
            var minThreshold = metricKey === 'ordered_revenue' ? 100 : 1;
            var movers = [];
            Object.keys(lastMap).forEach(function(asin) {
                if (!prevMap[asin]) return;
                var currVal = lastMap[asin][metricKey] || 0;
                var prevVal = prevMap[asin][metricKey] || 0;
                if (currVal < minThreshold && prevVal < minThreshold) return;
                movers.push({
                    asin: asin,
                    title: lastMap[asin].title || '',
                    currVal: currVal,
                    prevVal: prevVal,
                    deltaAbs: currVal - prevVal,
                    deltaPct: prevVal ? ((currVal - prevVal) / prevVal) * 100 : 0
                });
            });
            movers.sort(function(a, b) { return b.deltaAbs - a.deltaAbs; });
            var headers = ['ASIN', 'Titel', 'Aktuell', 'Vormonat', 'Delta', 'Delta %'];
            var rows = movers.map(function(m) { return [m.asin, m.title, m.currVal, m.prevVal, m.deltaAbs, Math.round(m.deltaPct * 10) / 10]; });
            exportToExcel(rows, headers, 'Top Movers', 'Top-Movers');
        }

        function renderTopMoverCharts(winners, losers) {
            if (!winners || !losers) return;

            var textColor = getThemeColor('--text-secondary');
            var gridColor = getThemeColor('--chart-grid');
            var successColor = getThemeColor('--success');
            var errorColor = getThemeColor('--error');
            var metricFmt = getMetricFormatter(moverMetric);

            var wCanvas = document.getElementById('winnersChart');
            if (wCanvas && winners.length > 0) {
                if (winnersChartInstance) winnersChartInstance.destroy();
                winnersChartInstance = new Chart(wCanvas, {
                    type: 'bar',
                    data: {
                        labels: winners.map(function(m) { return m.asin; }),
                        datasets: [{
                            data: winners.map(function(m) { return m.deltaAbs; }),
                            backgroundColor: successColor || '#1a7f37',
                            borderRadius: 4
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: { callbacks: { label: function(ctx) { return '+' + metricFmt(ctx.raw); } } }
                        },
                        scales: {
                            x: { ticks: { color: textColor, font: { family: 'Arial', size: 10 }, callback: function(v) { return metricFmt(v); } }, grid: { color: gridColor } },
                            y: { ticks: { color: textColor, font: { family: 'monospace', size: 10 } }, grid: { display: false } }
                        }
                    }
                });
            }

            var lCanvas = document.getElementById('losersChart');
            if (lCanvas && losers.length > 0) {
                if (losersChartInstance) losersChartInstance.destroy();
                losersChartInstance = new Chart(lCanvas, {
                    type: 'bar',
                    data: {
                        labels: losers.map(function(m) { return m.asin; }),
                        datasets: [{
                            data: losers.map(function(m) { return m.deltaAbs; }),
                            backgroundColor: errorColor || '#cf222e',
                            borderRadius: 4
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: { callbacks: { label: function(ctx) { return metricFmt(ctx.raw); } } }
                        },
                        scales: {
                            x: { ticks: { color: textColor, font: { family: 'Arial', size: 10 }, callback: function(v) { return metricFmt(v); } }, grid: { color: gridColor } },
                            y: { ticks: { color: textColor, font: { family: 'monospace', size: 10 } }, grid: { display: false } }
                        }
                    }
                });
            }
        }

        /* ── D. Produkt-Ranking ── */
        function renderRanking() {
            var el = document.getElementById('rankingSection');
            if (!el) return;
            if (selectedMonths.length === 0) { el.innerHTML = ''; return; }

            var data = getSelectedData();

            var asinMap = {};
            data.forEach(function(r) {
                if (!r.asin) return;
                if (!asinMap[r.asin]) {
                    asinMap[r.asin] = { asin: r.asin, title: r.title || '', brand: r.brand || '', ordered_revenue: 0, ordered_units: 0, shipped_revenue: 0, customer_returns: 0 };
                }
                asinMap[r.asin].ordered_revenue += r.ordered_revenue || 0;
                asinMap[r.asin].ordered_units += r.ordered_units || 0;
                asinMap[r.asin].shipped_revenue += r.shipped_revenue || 0;
                asinMap[r.asin].customer_returns += r.customer_returns || 0;
                if (r.title) asinMap[r.asin].title = r.title;
                if (r.brand) asinMap[r.asin].brand = r.brand;
            });

            var rows = Object.values(asinMap);

            if (rankSearch) {
                var lower = rankSearch.toLowerCase();
                rows = rows.filter(function(r) {
                    return r.asin.toLowerCase().indexOf(lower) >= 0 || r.title.toLowerCase().indexOf(lower) >= 0 || r.brand.toLowerCase().indexOf(lower) >= 0;
                });
            }

            rows.sort(function(a, b) {
                var va = a[rankSortCol] || 0;
                var vb = b[rankSortCol] || 0;
                if (rankSortCol === 'asin' || rankSortCol === 'title' || rankSortCol === 'brand') {
                    va = (a[rankSortCol] || '').toLowerCase();
                    vb = (b[rankSortCol] || '').toLowerCase();
                    return rankSortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
                }
                return rankSortDir === 'asc' ? va - vb : vb - va;
            });

            var totalRows = rows.length;
            var allRowsForExport = rows.slice();
            var displayRows = rows.slice(0, rankDisplayCount);

            function sortIcon(col) {
                var active = rankSortCol === col;
                var arrow = active ? (rankSortDir === 'asc' ? '&#9650;' : '&#9660;') : '&#9650;';
                return '<span class="sort-icon">' + arrow + '</span>';
            }
            function thClass(col) {
                return rankSortCol === col ? ' class="sorted"' : '';
            }

            var cols = [
                { key: '#', label: '#', sortable: false },
                { key: 'asin', label: 'ASIN' },
                { key: 'title', label: 'Titel' },
                { key: 'brand', label: 'Marke' },
                { key: 'ordered_revenue', label: 'Best.-Umsatz' },
                { key: 'ordered_units', label: 'Einheiten' },
                { key: 'shipped_revenue', label: 'Vers.-Umsatz' },
                { key: 'customer_returns', label: 'Rücksendungen' }
            ];

            var html = '<div class="table-section">' +
                '<div class="table-toolbar">' +
                    '<div class="table-toolbar-left">' +
                        '<span class="table-count">' + infoIcon('ranking', 'Produkt-Ranking', 'Alle ASINs aggregiert über die ausgewählten Monate. Klick auf Spaltenköpfe zum Sortieren.') + ' ' + totalRows + ' ASINs</span>' +
                        '<select class="filter-select" onchange="rankSortChange(this.value)">' +
                            '<option value="ordered_revenue"' + (rankSortCol === 'ordered_revenue' ? ' selected' : '') + '>Nach Umsatz</option>' +
                            '<option value="ordered_units"' + (rankSortCol === 'ordered_units' ? ' selected' : '') + '>Nach Einheiten</option>' +
                            '<option value="shipped_revenue"' + (rankSortCol === 'shipped_revenue' ? ' selected' : '') + '>Nach Vers.-Umsatz</option>' +
                            '<option value="customer_returns"' + (rankSortCol === 'customer_returns' ? ' selected' : '') + '>Nach Rücksendungen</option>' +
                        '</select>' +
                        '<button class="btn-export" onclick="exportRanking()">&#8681; Export</button>' +
                    '</div>' +
                    '<input class="search-input" type="text" placeholder="ASIN, Titel oder Marke suchen..." value="' + (rankSearch || '') + '" oninput="rankSearchChange(this.value)">' +
                '</div>' +
                '<div class="table-wrap"><table><thead><tr>';

            cols.forEach(function(c) {
                if (!c.sortable && c.sortable === false) {
                    html += '<th>' + c.label + '</th>';
                } else {
                    html += '<th' + thClass(c.key) + ' onclick="rankSort(\'' + c.key + '\')">' + c.label + ' ' + sortIcon(c.key) + '</th>';
                }
            });

            html += '</tr></thead><tbody>';

            displayRows.forEach(function(r, i) {
                html += '<tr>' +
                    '<td>' + (i + 1) + '</td>' +
                    '<td><a href="product.html?client=' + selectedClientId + '&asin=' + r.asin + '" class="asin-link">' + r.asin + '</a></td>' +
                    '<td title="' + r.title.replace(/"/g, '&quot;') + '">' + r.title + '</td>' +
                    '<td>' + r.brand + '</td>' +
                    '<td>' + formatEuro(r.ordered_revenue) + '</td>' +
                    '<td>' + formatInt(r.ordered_units) + '</td>' +
                    '<td>' + formatEuro(r.shipped_revenue) + '</td>' +
                    '<td>' + formatInt(r.customer_returns) + '</td>' +
                    '</tr>';
            });

            html += '</tbody></table></div>';

            if (totalRows > rankDisplayCount) {
                html += '<div class="load-more-wrap"><button class="btn-load-more" onclick="rankLoadMore()">Weitere laden (' + rankDisplayCount + ' / ' + totalRows + ')</button></div>';
            }

            html += '</div>';
            el.innerHTML = html;

            // Store for export
            window._rankExportRows = allRowsForExport;
        }

        function rankSortChange(val) {
            rankSortCol = val;
            rankSortDir = 'desc';
            rankDisplayCount = 50;
            renderRanking();
            initInfoIcons();
        }

        function rankSort(col) {
            if (rankSortCol === col) {
                rankSortDir = rankSortDir === 'asc' ? 'desc' : 'asc';
            } else {
                rankSortCol = col;
                rankSortDir = 'desc';
            }
            rankDisplayCount = 50;
            renderRanking();
            initInfoIcons();
        }

        function rankSearchChange(val) {
            rankSearch = val;
            rankDisplayCount = 50;
            renderRanking();
            initInfoIcons();
        }

        function rankLoadMore() {
            rankDisplayCount += 50;
            renderRanking();
            initInfoIcons();
        }

        function exportRanking() {
            var rows = (window._rankExportRows || []).map(function(r) {
                return [r.asin, r.title, r.brand, r.ordered_revenue, r.ordered_units, r.shipped_revenue, r.customer_returns];
            });
            exportToExcel(rows, ['ASIN', 'Titel', 'Marke', 'Best.-Umsatz', 'Einheiten', 'Vers.-Umsatz', 'Rücksendungen'], 'Produkt-Ranking', 'Produkt-Ranking');
        }

        /* ── E. Vorjahresvergleich (YoY) ── */
        function renderYoYSection() {
            var el = document.getElementById('yoySection');
            if (!el) return;

            var lastMonth = getLastMonth();
            if (!lastMonth) {
                el.innerHTML = '<div class="section-card"><div class="section-body" style="padding:40px 20px;text-align:center;color:var(--text-secondary);">Kein Monat ausgewählt.</div></div>';
                return;
            }

            // Determine current month and year-ago month
            if (!yoyMonth) yoyMonth = lastMonth;
            var yoyYear = parseInt(yoyMonth.substring(0, 4));
            var yoyMo = yoyMonth.substring(5, 7);
            var prevYearMonth = (yoyYear - 1) + '-' + yoyMo;

            var currData = getDataForMonth(yoyMonth);
            var prevData = getDataForMonth(prevYearMonth);
            var hasPrevYear = prevData.length > 0;

            // Month selector
            var monthOptions = availableMonths.map(function(m) {
                var ps = allData.find(function(r) { return monthSortKey(r.period_start) === m; });
                var label = ps ? monthLabel(ps.period_start) : m;
                return '<option value="' + m + '"' + (m === yoyMonth ? ' selected' : '') + '>' + label + '</option>';
            }).join('');

            var currLabel = monthLabel(currData.length > 0 ? currData[0].period_start : yoyMonth + '-01');
            var prevLabel = (yoyYear - 1) + ' ' + currLabel.split(' ')[0];

            var html = '<div class="section-card">' +
                '<div class="section-header">' +
                    '<h3>Vorjahresvergleich ' + infoIcon('yoy', 'Vorjahresvergleich', 'Vergleich des ausgewählten Monats mit dem gleichen Monat im Vorjahr.') + '</h3>' +
                    '<div style="display:flex;align-items:center;gap:8px;">' +
                        '<select class="filter-select" onchange="changeYoyMonth(this.value)">' + monthOptions + '</select>' +
                        '<button class="btn-export" onclick="exportYoY()">&#8681; Export</button>' +
                    '</div>' +
                '</div>' +
                '<div class="section-body">';

            if (!hasPrevYear) {
                html += '<div style="padding:40px 20px;text-align:center;color:var(--text-secondary);font-size:14px;">Keine Vorjahresdaten vorhanden für ' + prevLabel + '.</div>';
                html += '</div></div>';
                el.innerHTML = html;
                return;
            }

            // KPIs
            var kpis = [
                { key: 'ordered_revenue', label: 'Umsatz', fmt: formatEuro },
                { key: 'ordered_units', label: 'Einheiten', fmt: formatInt },
                { key: 'shipped_revenue', label: 'Versand', fmt: formatEuro },
                { key: 'customer_returns', label: 'Rücksendungen', fmt: formatInt, inverse: true }
            ];

            html += '<div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);">';
            kpis.forEach(function(kpi) {
                var curr = currData.reduce(function(s, r) { return s + (r[kpi.key] || 0); }, 0);
                var prev = prevData.reduce(function(s, r) { return s + (r[kpi.key] || 0); }, 0);
                var diff = prev ? ((curr - prev) / prev) * 100 : 0;
                var diffClass = diff > 0 ? 'positive' : diff < 0 ? 'negative' : 'neutral';
                if (kpi.inverse) diffClass = diff > 0 ? 'negative' : diff < 0 ? 'positive' : 'neutral';
                var diffStr = prev ? (diff > 0 ? '&#9650; +' : diff < 0 ? '&#9660; ' : '') + fmtPct.format(Math.abs(diff)) + ' % vs. Vorjahr' : '—';

                html += '<div class="kpi-card">' +
                    '<div class="kpi-label">' + kpi.label + '</div>' +
                    '<div class="kpi-value">' + kpi.fmt(curr) + '</div>' +
                    '<div class="kpi-diff ' + diffClass + '">' + diffStr + '</div>' +
                    '</div>';
            });
            html += '</div>';

            // Table
            var currMap = {}; currData.forEach(function(r) { if (r.asin) currMap[r.asin] = r; });
            var prevMap = {}; prevData.forEach(function(r) { if (r.asin) prevMap[r.asin] = r; });
            var allAsins = {};
            Object.keys(currMap).forEach(function(a) { allAsins[a] = true; });
            Object.keys(prevMap).forEach(function(a) { allAsins[a] = true; });

            var rows = Object.keys(allAsins).map(function(asin) {
                var c = currMap[asin] || {};
                var p = prevMap[asin] || {};
                var revCurr = c.ordered_revenue || 0;
                var revPrev = p.ordered_revenue || 0;
                return {
                    asin: asin,
                    title: c.title || p.title || '',
                    revCurr: revCurr,
                    revPrev: revPrev,
                    delta_rev: revCurr - revPrev,
                    delta_rev_pct: revPrev ? ((revCurr - revPrev) / revPrev) * 100 : (revCurr > 0 ? 100 : 0)
                };
            });

            rows.sort(function(a, b) {
                if (yoySortCol === 'asin' || yoySortCol === 'title') {
                    var va = (a[yoySortCol] || '').toLowerCase();
                    var vb = (b[yoySortCol] || '').toLowerCase();
                    return yoySortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
                }
                return yoySortDir === 'asc' ? (a[yoySortCol] || 0) - (b[yoySortCol] || 0) : (b[yoySortCol] || 0) - (a[yoySortCol] || 0);
            });

            window._yoyExportRows = rows;

            function yoySortIcon(col) {
                var active = yoySortCol === col;
                var arrow = active ? (yoySortDir === 'asc' ? '&#9650;' : '&#9660;') : '&#9650;';
                return '<span class="sort-icon">' + arrow + '</span>';
            }
            function yoyThClass(col) {
                return yoySortCol === col ? ' class="sorted"' : '';
            }

            html += '<div class="table-wrap" style="margin-top:16px;"><table><thead><tr>' +
                '<th' + yoyThClass('asin') + ' onclick="yoySort(\'asin\')" style="text-align:left;">ASIN ' + yoySortIcon('asin') + '</th>' +
                '<th' + yoyThClass('title') + ' onclick="yoySort(\'title\')" style="text-align:left;">Titel ' + yoySortIcon('title') + '</th>' +
                '<th' + yoyThClass('revCurr') + ' onclick="yoySort(\'revCurr\')">Umsatz ' + currLabel + ' ' + yoySortIcon('revCurr') + '</th>' +
                '<th' + yoyThClass('revPrev') + ' onclick="yoySort(\'revPrev\')">Umsatz ' + prevLabel + ' ' + yoySortIcon('revPrev') + '</th>' +
                '<th' + yoyThClass('delta_rev') + ' onclick="yoySort(\'delta_rev\')">&Delta; EUR ' + yoySortIcon('delta_rev') + '</th>' +
                '<th' + yoyThClass('delta_rev_pct') + ' onclick="yoySort(\'delta_rev_pct\')">&Delta; % ' + yoySortIcon('delta_rev_pct') + '</th>' +
                '</tr></thead><tbody>';

            rows.slice(0, 100).forEach(function(r) {
                var revClass = r.delta_rev > 0 ? 'val-positive' : r.delta_rev < 0 ? 'val-negative' : '';
                var pctClass = r.delta_rev_pct > 0 ? 'val-positive' : r.delta_rev_pct < 0 ? 'val-negative' : '';
                html += '<tr>' +
                    '<td style="text-align:left;font-size:12px;"><a href="product.html?client=' + selectedClientId + '&asin=' + r.asin + '" class="asin-link">' + r.asin + '</a></td>' +
                    '<td style="text-align:left;max-width:200px;overflow:hidden;text-overflow:ellipsis;" title="' + r.title.replace(/"/g, '&quot;') + '">' + r.title + '</td>' +
                    '<td>' + formatEuro(r.revCurr) + '</td>' +
                    '<td>' + formatEuro(r.revPrev) + '</td>' +
                    '<td class="' + revClass + '">' + (r.delta_rev > 0 ? '+' : '') + formatEuro(r.delta_rev) + '</td>' +
                    '<td class="' + pctClass + '">' + formatPct(r.delta_rev_pct) + '</td>' +
                    '</tr>';
            });

            html += '</tbody></table></div>';
            html += '</div></div>';
            el.innerHTML = html;
        }

        function changeYoyMonth(val) {
            yoyMonth = val;
            renderYoYSection();
            initInfoIcons();
        }

        function yoySort(col) {
            if (yoySortCol === col) {
                yoySortDir = yoySortDir === 'asc' ? 'desc' : 'asc';
            } else {
                yoySortCol = col;
                yoySortDir = 'desc';
            }
            renderYoYSection();
            initInfoIcons();
        }

        function exportYoY() {
            var rows = (window._yoyExportRows || []).map(function(r) {
                return [r.asin, r.title, r.revCurr, r.revPrev, r.delta_rev, Math.round(r.delta_rev_pct * 10) / 10];
            });
            exportToExcel(rows, ['ASIN', 'Titel', 'Umsatz aktuell', 'Umsatz Vorjahr', 'Delta EUR', 'Delta %'], 'Vorjahresvergleich', 'Vorjahresvergleich');
        }

        /* ── G. Brand-Analyse ── */
        function renderBrandSection() {
            var el = document.getElementById('brandSection');
            if (!el) return;
            if (selectedMonths.length === 0) {
                el.innerHTML = '<div class="section-card"><div class="section-body" style="padding:40px 20px;text-align:center;color:var(--text-secondary);">Kein Monat ausgewählt.</div></div>';
                return;
            }

            var data = getSelectedData();

            // Aggregate by brand
            var brandMap = {};
            var totalRevenue = 0;
            data.forEach(function(r) {
                var brand = r.brand || 'Unbekannt';
                if (!brandMap[brand]) {
                    brandMap[brand] = { brand: brand, revenue: 0, units: 0, returns: 0 };
                }
                brandMap[brand].revenue += r.ordered_revenue || 0;
                brandMap[brand].units += r.ordered_units || 0;
                brandMap[brand].returns += r.customer_returns || 0;
                totalRevenue += r.ordered_revenue || 0;
            });

            var brandRows = Object.values(brandMap);

            // Previous month for delta
            var lastMonth = getLastMonth();
            var prevMonth = lastMonth ? getPrevMonth(lastMonth) : null;
            var prevBrandMap = {};
            if (prevMonth) {
                var prevData = getDataForMonth(prevMonth);
                prevData.forEach(function(r) {
                    var brand = r.brand || 'Unbekannt';
                    if (!prevBrandMap[brand]) prevBrandMap[brand] = { revenue: 0 };
                    prevBrandMap[brand].revenue += r.ordered_revenue || 0;
                });
            }

            brandRows.forEach(function(b) {
                b.share = totalRevenue > 0 ? (b.revenue / totalRevenue) * 100 : 0;
                var prev = prevBrandMap[b.brand];
                b.deltaPct = prev && prev.revenue ? ((b.revenue - prev.revenue) / prev.revenue) * 100 : 0;
            });

            // Sort
            brandRows.sort(function(a, b) {
                if (brandSortCol === 'brand') {
                    var va = a.brand.toLowerCase();
                    var vb = b.brand.toLowerCase();
                    return brandSortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
                }
                return brandSortDir === 'asc' ? (a[brandSortCol] || 0) - (b[brandSortCol] || 0) : (b[brandSortCol] || 0) - (a[brandSortCol] || 0);
            });

            // Brand dropdown options
            var allBrands = brandRows.map(function(b) { return b.brand; }).sort();

            var html = '<div class="section-card">' +
                '<div class="section-header">' +
                    '<h3>Brand-Analyse ' + infoIcon('brand', 'Brand-Analyse', 'Gruppierung aller Produkte nach Marke. Zeigt Umsatzanteile und Trends.') + '</h3>' +
                    '<div style="display:flex;align-items:center;gap:8px;">' +
                        '<select class="filter-select" onchange="changeBrandFilter(this.value)">' +
                            '<option value="">Alle Brands</option>';
            allBrands.forEach(function(b) {
                html += '<option value="' + b.replace(/"/g, '&quot;') + '"' + (selectedBrand === b ? ' selected' : '') + '>' + b + '</option>';
            });
            html += '</select>' +
                        '<button class="btn-export" onclick="exportBrands()">&#8681; Export</button>' +
                    '</div>' +
                '</div>' +
                '<div class="section-body">';

            // KPIs for selected brand or all
            var kpiData = selectedBrand ? brandRows.filter(function(b) { return b.brand === selectedBrand; }) : brandRows;
            var kpiRevenue = kpiData.reduce(function(s, b) { return s + b.revenue; }, 0);
            var kpiUnits = kpiData.reduce(function(s, b) { return s + b.units; }, 0);
            var kpiShare = totalRevenue > 0 ? (kpiRevenue / totalRevenue) * 100 : 0;

            html += '<div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px;">' +
                '<div class="kpi-card"><div class="kpi-label">Gesamtumsatz</div><div class="kpi-value">' + formatEuro(kpiRevenue) + '</div></div>' +
                '<div class="kpi-card"><div class="kpi-label">Gesamte Einheiten</div><div class="kpi-value">' + formatInt(kpiUnits) + '</div></div>' +
                '<div class="kpi-card"><div class="kpi-label">Anteil am Gesamtumsatz</div><div class="kpi-value">' + fmtPct.format(kpiShare) + ' %</div></div>' +
                '</div>';

            // Charts row
            html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">';

            // Top 10 Brands bar chart
            html += '<div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;padding:16px;">' +
                '<div style="font-size:13px;font-weight:600;margin-bottom:12px;">Top 10 Brands nach Umsatz</div>' +
                '<div class="chart-container" style="height:300px;"><canvas id="brandBarChart"></canvas></div>' +
                '</div>';

            // Brand trend chart
            html += '<div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;padding:16px;">' +
                '<div style="font-size:13px;font-weight:600;margin-bottom:12px;">Brand-Trend über Monate</div>' +
                '<div class="chart-container" style="height:300px;"><canvas id="brandTrendChart"></canvas></div>' +
                '</div>';

            html += '</div>';

            // If a brand is selected, show its products
            if (selectedBrand) {
                var brandProducts = [];
                var asinMap = {};
                data.forEach(function(r) {
                    if ((r.brand || 'Unbekannt') !== selectedBrand) return;
                    if (!r.asin) return;
                    if (!asinMap[r.asin]) {
                        asinMap[r.asin] = { asin: r.asin, title: r.title || '', revenue: 0, units: 0 };
                    }
                    asinMap[r.asin].revenue += r.ordered_revenue || 0;
                    asinMap[r.asin].units += r.ordered_units || 0;
                    if (r.title) asinMap[r.asin].title = r.title;
                });
                brandProducts = Object.values(asinMap).sort(function(a, b) { return b.revenue - a.revenue; });

                html += '<div style="margin-bottom:16px;"><div style="font-size:13px;font-weight:600;margin-bottom:8px;">Produkte von ' + selectedBrand + '</div>';
                html += '<div class="table-wrap"><table><thead><tr>' +
                    '<th style="text-align:center;width:40px;">#</th>' +
                    '<th style="text-align:left;">ASIN</th>' +
                    '<th style="text-align:left;">Titel</th>' +
                    '<th>Umsatz</th>' +
                    '<th>Einheiten</th>' +
                    '</tr></thead><tbody>';
                brandProducts.forEach(function(p, i) {
                    html += '<tr>' +
                        '<td>' + (i + 1) + '</td>' +
                        '<td style="text-align:left;"><a href="product.html?client=' + selectedClientId + '&asin=' + p.asin + '" class="asin-link">' + p.asin + '</a></td>' +
                        '<td style="text-align:left;max-width:250px;overflow:hidden;text-overflow:ellipsis;" title="' + p.title.replace(/"/g, '&quot;') + '">' + p.title + '</td>' +
                        '<td>' + formatEuro(p.revenue) + '</td>' +
                        '<td>' + formatInt(p.units) + '</td>' +
                        '</tr>';
                });
                html += '</tbody></table></div></div>';
            }

            // Brand table
            function bSortIcon(col) {
                var active = brandSortCol === col;
                var arrow = active ? (brandSortDir === 'asc' ? '&#9650;' : '&#9660;') : '&#9650;';
                return '<span class="sort-icon">' + arrow + '</span>';
            }
            function bThClass(col) {
                return brandSortCol === col ? ' class="sorted"' : '';
            }

            html += '<div class="table-wrap"><table><thead><tr>' +
                '<th' + bThClass('brand') + ' onclick="brandSort(\'brand\')" style="text-align:left;">Brand ' + bSortIcon('brand') + '</th>' +
                '<th' + bThClass('revenue') + ' onclick="brandSort(\'revenue\')">Umsatz ' + bSortIcon('revenue') + '</th>' +
                '<th' + bThClass('units') + ' onclick="brandSort(\'units\')">Einheiten ' + bSortIcon('units') + '</th>' +
                '<th' + bThClass('share') + ' onclick="brandSort(\'share\')">Anteil % ' + bSortIcon('share') + '</th>' +
                '<th' + bThClass('deltaPct') + ' onclick="brandSort(\'deltaPct\')">&Delta; % vs. Vormonat ' + bSortIcon('deltaPct') + '</th>' +
                '</tr></thead><tbody>';

            window._brandExportRows = brandRows;

            brandRows.forEach(function(b) {
                var deltaClass = b.deltaPct > 0 ? 'val-positive' : b.deltaPct < 0 ? 'val-negative' : '';
                html += '<tr style="cursor:pointer;" onclick="changeBrandFilter(\'' + b.brand.replace(/'/g, "\\'") + '\')">' +
                    '<td style="text-align:left;font-weight:500;">' + b.brand + '</td>' +
                    '<td>' + formatEuro(b.revenue) + '</td>' +
                    '<td>' + formatInt(b.units) + '</td>' +
                    '<td>' + fmtPct.format(b.share) + ' %</td>' +
                    '<td class="' + deltaClass + '">' + formatPct(b.deltaPct) + '</td>' +
                    '</tr>';
            });

            html += '</tbody></table></div>';
            html += '</div></div>';
            el.innerHTML = html;

            renderBrandCharts(brandRows);
        }

        function renderBrandCharts(brandRows) {
            var textColor = getThemeColor('--text-secondary');
            var gridColor = getThemeColor('--chart-grid');

            // Top 10 bar chart
            var top10 = brandRows.slice().sort(function(a, b) { return b.revenue - a.revenue; }).slice(0, 10);
            var barCanvas = document.getElementById('brandBarChart');
            if (barCanvas && top10.length > 0) {
                if (brandBarChartInstance) brandBarChartInstance.destroy();
                var colors = ['#3551FF','#e85d04','#1a7f37','#cf222e','#8250df','#0969da','#bf8700','#6e7681','#f85149','#3fb950'];
                brandBarChartInstance = new Chart(barCanvas, {
                    type: 'bar',
                    data: {
                        labels: top10.map(function(b) { return b.brand; }),
                        datasets: [{
                            data: top10.map(function(b) { return b.revenue; }),
                            backgroundColor: colors.slice(0, top10.length),
                            borderRadius: 4
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: { callbacks: { label: function(ctx) { return formatEuro(ctx.raw); } } }
                        },
                        scales: {
                            x: { ticks: { color: textColor, font: { family: 'Arial', size: 10 }, callback: function(v) { return formatEuro(v); } }, grid: { color: gridColor } },
                            y: { ticks: { color: textColor, font: { family: 'Arial', size: 10 } }, grid: { display: false } }
                        }
                    }
                });
            }

            // Trend chart: top 5 brands over months
            var trendCanvas = document.getElementById('brandTrendChart');
            if (trendCanvas && selectedMonths.length > 0) {
                if (brandTrendChartInstance) brandTrendChartInstance.destroy();

                var top5Brands = brandRows.slice().sort(function(a, b) { return b.revenue - a.revenue; }).slice(0, 5).map(function(b) { return b.brand; });
                if (selectedBrand && top5Brands.indexOf(selectedBrand) < 0) {
                    top5Brands = [selectedBrand].concat(top5Brands.slice(0, 4));
                }

                var trendLabels = [];
                var trendDatasets = [];
                var brandColors = ['#3551FF','#e85d04','#1a7f37','#cf222e','#8250df'];

                selectedMonths.forEach(function(m) {
                    var ps = allData.find(function(r) { return monthSortKey(r.period_start) === m; });
                    trendLabels.push(ps ? monthLabel(ps.period_start) : m);
                });

                top5Brands.forEach(function(brand, idx) {
                    var dset = {
                        label: brand,
                        data: [],
                        borderColor: brandColors[idx % brandColors.length],
                        backgroundColor: 'transparent',
                        borderWidth: 2,
                        pointRadius: 3,
                        tension: 0.3,
                        fill: false
                    };
                    selectedMonths.forEach(function(m) {
                        var monthData = getDataForMonth(m);
                        var sum = monthData.filter(function(r) { return (r.brand || 'Unbekannt') === brand; })
                            .reduce(function(s, r) { return s + (r.ordered_revenue || 0); }, 0);
                        dset.data.push(sum);
                    });
                    trendDatasets.push(dset);
                });

                brandTrendChartInstance = new Chart(trendCanvas, {
                    type: 'line',
                    data: { labels: trendLabels, datasets: trendDatasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { labels: { color: textColor, font: { family: 'Arial', size: 11 } } },
                            tooltip: { callbacks: { label: function(ctx) { return ctx.dataset.label + ': ' + formatEuro(ctx.raw); } } }
                        },
                        scales: {
                            x: { ticks: { color: textColor, font: { family: 'Arial', size: 10 } }, grid: { color: gridColor } },
                            y: { ticks: { color: textColor, font: { family: 'Arial', size: 10 }, callback: function(v) { return formatEuro(v); } }, grid: { color: gridColor } }
                        }
                    }
                });
            }
        }

        function changeBrandFilter(val) {
            selectedBrand = val;
            // Update the dropdown if it exists
            var sel = document.querySelector('#brandSection .filter-select');
            if (sel) sel.value = val;
            destroyAllCharts();
            renderBrandSection();
            initInfoIcons();
        }

        function brandSort(col) {
            if (brandSortCol === col) {
                brandSortDir = brandSortDir === 'asc' ? 'desc' : 'asc';
            } else {
                brandSortCol = col;
                brandSortDir = 'desc';
            }
            destroyAllCharts();
            renderBrandSection();
            initInfoIcons();
        }

        function exportBrands() {
            var rows = (window._brandExportRows || []).map(function(b) {
                return [b.brand, b.revenue, b.units, Math.round(b.share * 10) / 10, Math.round(b.deltaPct * 10) / 10];
            });
            exportToExcel(rows, ['Brand', 'Umsatz', 'Einheiten', 'Anteil %', 'Delta % vs. Vormonat'], 'Brand-Analyse', 'Brand-Analyse');
        }

        // Start
        init();
    </script>
</body>
</html>
